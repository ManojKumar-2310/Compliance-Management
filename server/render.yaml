services:
  - type: web
    name: compliance-management-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://complaince-management-tool.netlify.app
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 1d
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: MAX_FILE_SIZE
        value: 5242880
